# If :app:compileFlutterBuildDebug fails with "Unable to determine engine version" or CLR 80004005: Flutter
# prefers pwsh.exe; a broken PowerShell 7 breaks bin/internal/update_engine_version.ps1.
# Fix: run android\gradlew.bat --stop then build via android\gradlew_flutter.cmd assembleDebug,
# or scripts\flutter_windows_build.cmd run, or remove PowerShell 7 from PATH / flutter upgrade / repair pwsh.
#
# Machine ~7GB RAM: large -Xmx reserves heap + native mmap and crashes the daemon (see hs_err: G1 virtual space).
# Raise -Xmx if you have 16GB+ RAM and builds are slow.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx512m
android.useAndroidX=true
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.workers.max=2
